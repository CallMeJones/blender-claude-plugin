name: MCP smoke

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  mcp-smoke:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile MCP bridge modules
        run: >
          python -m py_compile
          addon\claude_blender\mcp_server.py
          addon\claude_blender\bridge_protocol.py
          addon\claude_blender\bridge_server.py
          addon\claude_blender\audit_log.py
          addon\claude_blender\script_analysis.py
          scripts\build_extension_zip.py
          scripts\build_extension_repository.py
          tests\smoke_audit_log.py
          tests\smoke_build_extension_zip.py
          tests\smoke_extension_repository.py
          tests\smoke_script_analysis.py
          tests\smoke_mcp_server.py

      - name: Run audit log smoke test
        run: python tests\smoke_audit_log.py

      - name: Run script analysis smoke test
        run: python tests\smoke_script_analysis.py

      - name: Run extension build smoke test
        run: python tests\smoke_build_extension_zip.py

      - name: Run extension repository smoke test
        run: python tests\smoke_extension_repository.py

      - name: Run stdio MCP smoke test
        run: python tests\smoke_mcp_server.py

      - name: Build extension zip
        run: python scripts\build_extension_zip.py

      - name: Build GitHub Pages extension repository
        run: python scripts\build_extension_repository.py --repo-dir public

      - name: Upload extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: blender-agent-bridge-extension
          path: |
            dist/*.zip
            dist/*.sha256

      - name: Publish tagged GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.sha256

      - name: Upload GitHub Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: mcp-smoke
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
